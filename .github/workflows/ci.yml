# Run the github CI which builds the launcher and uses it to build examples, run the formatter and clippy checker
name: CI

on:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
  RUSTFLAGS: -C link-arg=-fuse-ld=mold

jobs:
  build_launcher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/linux-deps

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            engine -> target

      - name: Build PillLauncher (release)
        run: cargo build --release --manifest-path engine/pill_launcher/Cargo.toml

      - name: Upload PillLauncher artifact
        uses: actions/upload-artifact@v4
        with:
          name: pilllauncher-linux
          path: engine/pill_launcher/target/release/PillLauncher

  code_formatting_check:
    runs-on: ubuntu-latest
    needs: build_launcher
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/linux-deps

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Download PillLauncher artifact
        uses: actions/download-artifact@v4
        with:
          name: pilllauncher-linux
          path: engine/pill_launcher/target/release

      - name: Run fmt via PillLauncher and ensure repo stays clean
        shell: bash
        run: |
          set -euo pipefail
          chmod +x engine/pill_launcher/target/release/PillLauncher
          ./engine/pill_launcher/target/release/PillLauncher -a cargo -p examples/floating_pills/ -- fmt
          git diff --exit-code -- . ':(exclude)engine/Cargo.toml' ':(exclude)examples/floating_pills/Cargo.toml'

  code_linting_check:
    runs-on: ubuntu-latest
    needs: build_launcher
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/linux-deps

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            engine -> target

      - name: Download PillLauncher artifact
        uses: actions/download-artifact@v4
        with:
          name: pilllauncher-linux
          path: engine/pill_launcher/target/release

      - name: Run clippy via PillLauncher (-D warnings)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x engine/pill_launcher/target/release/PillLauncher
          ./engine/pill_launcher/target/release/PillLauncher -a cargo -p examples/floating_pills/ -- clippy -- -D warnings
          git diff --exit-code -- . ':(exclude)engine/Cargo.toml' ':(exclude)examples/floating_pills/Cargo.toml'

  build_examples:
    runs-on: ubuntu-latest
    needs: build_launcher
    strategy:
      fail-fast: false
      matrix:
        example:
          - examples/floating_pills/
          - examples/italian_brainrot
          - examples/net_minimal/client
          - examples/net_minimal/server

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/linux-deps

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            engine -> target
            examples/floating_pills -> target
            examples/italian_brainrot -> target
            examples/net_minimal/client -> target
            examples/net_minimal/server -> target

      - name: Download PillLauncher artifact
        uses: actions/download-artifact@v4
        with:
          name: pilllauncher-linux
          path: engine/pill_launcher/target/release

      - name: Build example (PillLauncher or cargo for headless server)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x engine/pill_launcher/target/release/PillLauncher

          if [[ "${{ matrix.example }}" == "examples/net_minimal/server" ]]; then
            # Build the server as a normal Rust binary (headless)
            cargo build --manifest-path "${{ matrix.example }}/Cargo.toml"
          else
            ./engine/pill_launcher/target/release/PillLauncher -a build -p "${{ matrix.example }}"
          fi
