[package]
name = "pill_renderer"
version = "0.1.0"
edition = "2021"

[dependencies]
pill_core = {path = "../pill_core"}
pill_engine = {path = "../pill_engine", features = ["internal"]}

# Data containers
slotmap = "1.0.6"
slab = "0.4.5"
indexmap = "1.7.0"

# Loaders
image = "0.23"
tobj = "3.0"

# Errors
anyhow = "1.0"

# Logging
env_logger = "0.9.0"
log = "0.4"

# Other
wgpu = { version = "25.0.0", features = [ "spirv" ] }
glam = { version = "0.30.8", features = ["serde", "bytemuck"] }
winit = "0.30.12"
cgmath = "0.18"
futures = "0.3"
pollster = "0.2"
bytemuck = { version = "1.4", features = [ "derive" ] }
config = "0.11"
naga = { version = "0.19", features = ["glsl-in", "wgsl-out"] }

# egui
egui = "0.32.1"
egui-wgpu = { version = "0.32.1", features = ["winit"] }
egui-winit = "0.32.1"
