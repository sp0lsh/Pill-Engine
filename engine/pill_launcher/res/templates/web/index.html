<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pill Engine - WebGPU</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background: #fff;
            color: #222;
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #made-with {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 42px;
            color: #666;
            user-select: none;
        }
        #made-with img { height: 66px; width: auto; display: block; }
        #fullscreen-btn {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 22px;
            font: inherit;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: #fff;
            background: #222;
            border: 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
            cursor: pointer;
            transition: background 0.1s ease, transform 0.1s ease;
        }
        #fullscreen-btn:hover { background: #000; }
        #fullscreen-btn:active { transform: translateX(-50%) translateY(1px); }
        #canvas {
            display: block;
            width: 80vw;
            height: 80vh;
        }
        #canvas:fullscreen { width: 100vw; height: 100vh; }
        #error {
            color: #c0392b;
            font-family: ui-monospace, Menlo, Consolas, monospace;
            padding: 20px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div id="made-with">
        <span>made with</span>
        <img src="./pill_logo.png" alt="Pill Engine">
    </div>
    <button id="fullscreen-btn" type="button">⛶ Fullscreen</button>
    <canvas id="canvas"></canvas>
    <div id="error"></div>

    <script type="module">
        const errorDiv = document.getElementById('error');
        const canvas = document.getElementById('canvas');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const fs = document.fullscreenElement === canvas;
            const w = Math.floor(window.innerWidth * (fs ? 1.0 : 0.8));
            const h = Math.floor(window.innerHeight * (fs ? 1.0 : 0.8));
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        document.addEventListener('fullscreenchange', resizeCanvas);

        if (canvas.requestFullscreen) {
            fullscreenBtn.addEventListener('click', () => canvas.requestFullscreen());
        } else {
            fullscreenBtn.style.display = 'none';
        }

        function showError(msg) {
            canvas.style.display = 'none';
            errorDiv.style.display = 'block';
            errorDiv.textContent = msg;
        }

        async function checkWebGPU() {
            if (!navigator.gpu) {
                showError('WebGPU is not supported in this browser. Try Chrome/Edge 113+, Safari 18+, or Firefox 141+.');
                return false;
            }
            const adapter = await navigator.gpu.requestAdapter();
            if (!adapter) {
                showError('No WebGPU adapter found.');
                return false;
            }
            return true;
        }

        async function run() {
            if (!await checkWebGPU()) return;
            try {
                const { default: init } = await import('./pill_web.js');
                await init();
            } catch (e) {
                console.error('Failed to load WASM:', e);
                showError('Failed to load game: ' + e.message);
            }
        }

        run();
    </script>
</body>
</html>
