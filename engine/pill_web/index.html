<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pill Engine - WebGPU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #canvas {
            display: block;
            width: 80vw;
            height: 80vh;
        }
        #error {
            color: #ff6b6b;
            font-family: monospace;
            padding: 20px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="error"></div>

    <script type="module">
        const errorDiv = document.getElementById('error');
        const canvas = document.getElementById('canvas');

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const w = Math.floor(window.innerWidth * 0.8);
            const h = Math.floor(window.innerHeight * 0.8);
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function showError(msg) {
            canvas.style.display = 'none';
            errorDiv.style.display = 'block';
            errorDiv.textContent = msg;
        }

        async function checkWebGPU() {
            if (!navigator.gpu) {
                showError('WebGPU is not supported in this browser. Try Chrome 113+ or Edge 113+');
                return false;
            }
            const adapter = await navigator.gpu.requestAdapter();
            if (!adapter) {
                showError('No WebGPU adapter found.');
                return false;
            }
            return true;
        }

        async function run() {
            if (!await checkWebGPU()) return;

            try {
                const { default: init } = await import('./pill_web.js');
                await init();
            } catch (e) {
                console.error('Failed to load WASM:', e);
                showError('Failed to load game: ' + e.message);
            }
        }

        run();
    </script>
</body>
</html>
